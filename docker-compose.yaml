services:
  agma_db:
    image: postgres:16
    container_name: agma_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - db_data_agma:/var/lib/postgresql/data
      
  
volumes:
  db_data_agma:
